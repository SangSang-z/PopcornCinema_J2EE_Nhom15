<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Combo</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="admin-content">

        <div class="container mt-4 combo-container">

            <!-- TITLE -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="combo-title">Quản lý Bắp Nước</h2>

                <a th:href="@{/admin/combo/add}" class="btn btn-success btn-add-combo">
                    + Thêm Combo
                </a>
            </div>

            <!-- TABLE -->
            <div class="table-responsive">
                <table class="table combo-table text-center align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Tên</th>
                            <th>Giá</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!-- EMPTY -->
                        <tr th:if="${#lists.isEmpty(combos)}">
                            <td colspan="6">Chưa có combo nào</td>
                        </tr>

                        <!-- DATA -->
                        <tr th:each="c : ${combos}">

                            <td th:text="${c.id}"></td>

                            <!-- IMAGE -->
                            <td>
                                <img class="combo-img"
                                    th:src="${c.image != null and !#strings.isEmpty(c.image) ? c.image : '/images/pepsi.jpg'}"
                                    style="width:80px; height:80px; object-fit:cover;">
                            </td>

                            <!-- NAME -->
                            <td class="combo-name"
                                th:text="${c.name != null ? c.name : 'Không tên'}"></td>

                            <!-- PRICE -->
                            <td class="combo-price"
                                th:text="${c.price != null ? #numbers.formatDecimal(c.price,0,'COMMA',0,'POINT') + 'đ' : '0đ'}"></td>

                            <!-- STATUS -->
                            <td>
                                <span class="badge bg-success combo-status"
                                      th:if="${c.status != null and c.status == 'ACTIVE'}">
                                      Hoạt động
                                </span>

                                <span class="badge bg-secondary combo-status"
                                      th:if="${c.status == null or c.status != 'ACTIVE'}">
                                      Ẩn
                                </span>
                            </td>

                            <!-- ACTION -->
                            <td>
                                <a th:href="@{/admin/combo/add(id=${c.id})}"
                                   class="btn btn-warning btn-sm combo-btn">
                                   Sửa
                                </a>

                                <a th:href="@{/admin/combo/delete/{id}(id=${c.id})}"
                                   class="btn btn-danger btn-sm combo-btn"
                                   onclick="return confirm('Xóa combo này?')">
                                   Xóa
                                </a>
                            </td>

                        </tr>

                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
