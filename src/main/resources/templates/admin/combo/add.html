<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm Combo</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="admin-content">

        <div class="container mt-4 combo-container">

            <h2 class="combo-title mb-4">Thêm / Sửa Combo</h2>

            <form th:action="@{/admin/combo/save}" 
                  method="post" 
                  enctype="multipart/form-data"
                  th:object="${combo}">

                <input type="hidden" th:field="*{id}">

                <!-- NAME -->
                <div class="mb-3">
                    <label class="form-label">Tên combo</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <!-- PRICE -->
                <div class="mb-3">
                    <label class="form-label">Giá</label>
                    <input type="number" class="form-control" th:field="*{price}" required>
                </div>

                <!-- IMAGE FILE -->
                <div class="mb-3">
                    <label class="form-label">Chọn ảnh</label>
                    <input type="file" name="imageFile" class="form-control" onchange="previewImage(event)">
                </div>

                <!-- PREVIEW -->
                <div class="mb-3">
                    <img id="preview" 
                         th:src="${combo.image}" 
                         style="width:120px; border-radius:10px;">
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control" th:field="*{description}"></textarea>
                </div>

                <!-- STATUS -->
                <div class="mb-3">
                    <label class="form-label">Trạng thái</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="ACTIVE">Hoạt động</option>
                        <option value="INACTIVE">Ẩn</option>
                    </select>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn btn-success">Lưu</button>
                <a th:href="@{/admin/combo}" class="btn btn-secondary">Quay lại</a>

            </form>

        </div>

    </div>

</div>

<script>
function previewImage(event){
    const file = event.target.files[0];
    if(file){
        document.getElementById('preview').src = URL.createObjectURL(file);
    }
}
</script>

</body>
</html>
