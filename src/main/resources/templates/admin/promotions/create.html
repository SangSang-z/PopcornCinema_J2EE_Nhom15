<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tạo khuyến mãi</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <div class="admin-content">
        <div class="container mt-4 admin-card">
            <h2 class="page-title mb-4">Tạo khuyến mãi</h2>

            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/admin/promotions/save}" method="post" class="admin-form">

                <div class="mb-3">
                    <label class="form-label">Mã khuyến mãi</label>
                    <input type="text" name="code" class="form-control" placeholder="VD: PROMO1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tiêu đề</label>
                    <input type="text" name="title" class="form-control" placeholder="VD: Giảm 20% vé tối thứ 3">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">% Giảm</label>
                    <input type="number" name="discountPercent" class="form-control" min="1" max="100" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Đơn tối thiểu (VND)</label>
                    <input type="number" name="minOrderValue" class="form-control" min="0" value="0">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ngày bắt đầu</label>
                    <input type="datetime-local" name="startDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ngày kết thúc</label>
                    <input type="datetime-local" name="endDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>

                <button class="btn btn-success px-4">
                    Lưu khuyến mãi
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
