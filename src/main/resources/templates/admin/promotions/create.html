<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tạo khuyến mãi</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <div class="container mt-4 admin-card">

                <h2 class="page-title mb-4">Tạo khuyến mãi</h2>

                <form th:action="@{/admin/promotions/save}"
                      method="post"
                      class="admin-form">

                    <!-- CODE -->
                    <div class="mb-3">
                        <label class="form-label">Mã khuyến mãi</label>
                        <input type="text"
                               name="code"
                               class="form-control"
                               placeholder="VD: SALE50"
                               required>
                    </div>

                    <!-- DISCOUNT -->
                    <div class="mb-3">
                        <label class="form-label">% Giảm</label>
                        <input type="number"
                               name="discountPercent"
                               class="form-control"
                               min="1" max="100"
                               required>
                    </div>

                    <!-- MIN ORDER -->
                    <div class="mb-3">
                        <label class="form-label">Đơn tối thiểu (VND)</label>
                        <input type="number"
                               name="minOrderValue"
                               class="form-control"
                               min="0">
                    </div>

                    <!-- BUTTON -->
                    <button class="btn btn-success px-4">
                        Lưu khuyến mãi
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
