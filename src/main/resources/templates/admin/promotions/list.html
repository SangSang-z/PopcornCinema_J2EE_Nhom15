<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Khuyến mãi</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <div class="container mt-4">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h2 class="page-title">Khuyến mãi</h2>
                        <p class="text-muted">Quản lý mã giảm giá hệ thống</p>
                    </div>

                    <a th:href="@{/admin/promotions/create}" class="btn btn-primary">
                        + Tạo khuyến mãi
                    </a>
                </div>

                <!-- TABLE -->
                <div class="admin-card">

                    <table class="table table-hover align-middle text-center">

                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Mã</th>
                                <th>Giảm giá</th>
                                <th>Đơn tối thiểu</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>

                        <tbody>

                            <!-- EMPTY -->
                            <tr th:if="${#lists.isEmpty(promotions)}">
                                <td colspan="6">Chưa có khuyến mãi</td>
                            </tr>

                            <!-- DATA -->
                            <tr th:each="p : ${promotions}">

                                <td th:text="${p.id}"></td>

                                <td class="fw-bold text-primary"
                                    th:text="${p.code}"></td>

                                <td th:text="${p.discountPercent} + '%'"></td>

                                <td th:text="${#numbers.formatDecimal(p.minOrderValue,0,'COMMA',0,'POINT')} + ' VND'"></td>

                                <!-- STATUS -->
                                <td>
                                    <span th:if="${p.active}"
                                          class="badge bg-success">
                                          Active
                                    </span>

                                    <span th:unless="${p.active}"
                                          class="badge bg-secondary">
                                          Inactive
                                    </span>
                                </td>

                                <!-- ACTION -->
                                <td>

                                    <a th:href="@{'/admin/promotions/toggle/' + ${p.id}}"
                                       class="btn btn-warning btn-sm">
                                       Toggle
                                    </a>

                                    <a th:href="@{'/admin/promotions/delete/' + ${p.id}}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Xóa khuyến mãi này?')">
                                       Delete
                                    </a>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script th:src="@{/js/script.js}"></script>

</body>
</html>
