<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý thanh toán / đặt vé</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <div class="admin-content">
        <h2 class="page-title">Danh sách thanh toán / đơn vé</h2>

        <form th:action="@{/admin/bookings}" method="get" class="d-flex mb-3">
            <input type="text"
                   name="keyword"
                   class="form-control me-2"
                   placeholder="Tìm theo mã đơn, email, SĐT, phim..."
                   th:value="${keyword}">
            <button class="btn btn-primary">Tìm</button>
        </form>

        <div class="admin-card">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Mã GD</th>
                    <th>Người dùng</th>
                    <th>Phim / suất</th>
                    <th>Ghế</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                    <th>Booking</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="9" class="text-center">Không có dữ liệu</td>
                </tr>

                <tr th:each="o : ${rows}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.orderCode}"></td>

                    <td>
                        <div><b th:text="${o.userName}"></b></div>
                        <div class="text-muted small" th:text="${o.userEmail}"></div>
                        <div class="text-muted small" th:text="${o.userPhone}"></div>
                    </td>

                    <td>
                        <div th:text="${o.movieTitle}"></div>
                        <div class="text-muted small"
                             th:text="${o.showtimeStart != null ? #temporals.format(o.showtimeStart, 'dd/MM/yyyy HH:mm') : 'N/A'}"></div>
                    </td>

                    <td th:text="${o.seatsText}"></td>

                    <td th:text="${#numbers.formatDecimal(o.amount,0,'COMMA',0,'POINT')} + ' VND'"></td>

                    <td>
                        <span class="badge bg-secondary"
                              th:if="${o.transactionStatus == 'PENDING'}"
                              th:text="${o.transactionStatus}"></span>

                        <span class="badge bg-warning text-dark"
                              th:if="${o.transactionStatus == 'PENDING_CONFIRMATION'}"
                              th:text="${o.transactionStatus}"></span>

                        <span class="badge bg-success"
                              th:if="${o.transactionStatus == 'PAID'}"
                              th:text="${o.transactionStatus}"></span>

                        <span class="badge bg-danger"
                              th:if="${o.transactionStatus == 'REJECTED' or o.transactionStatus == 'FAILED'}"
                              th:text="${o.transactionStatus}"></span>

                        <span class="badge bg-dark"
                              th:if="${o.transactionStatus == 'EXPIRED' or o.transactionStatus == 'CANCELLED'}"
                              th:text="${o.transactionStatus}"></span>

                        <div class="text-muted small mt-1"
                             th:text="${o.createdAt != null ? #temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm') : ''}"></div>
                    </td>

                    <td>
                        <div th:text="${o.bookingCode != null && !#strings.isEmpty(o.bookingCode) ? o.bookingCode : '-'}"></div>
                        <div class="text-muted small"
                             th:text="${o.bookingStatus != null && !#strings.isEmpty(o.bookingStatus) ? o.bookingStatus : ''}"></div>
                    </td>

                    <td>
                        <div class="d-flex gap-2" th:if="${o.canConfirm or o.canReject}">
                            <form th:action="@{/admin/bookings/{orderCode}/confirm(orderCode=${o.orderCode})}" method="post">
                                <button class="btn btn-success btn-sm">Xác nhận</button>
                            </form>

                            <form th:action="@{/admin/bookings/{orderCode}/reject(orderCode=${o.orderCode})}" method="post">
                                <button class="btn btn-danger btn-sm">Từ chối</button>
                            </form>
                        </div>

                        <span class="text-muted small" th:if="${!o.canConfirm and !o.canReject}">
                            Không có thao tác
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
