<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Danh sách đơn hàng</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <h2 class="page-title">Danh sách đơn hàng</h2>

            <!-- SEARCH -->
            <form th:action="@{/admin/orders}" method="get" class="d-flex mb-3">
                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Tìm theo email hoặc SĐT..."
                       th:value="${keyword}">
                <button class="btn btn-primary">Tìm</button>
            </form>

            <div class="admin-card">

                <table class="table table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Người dùng</th>
                            <th>Phim</th>
                            <th>Suất chiếu</th>
                            <th>Ghế</th>
                            <th>Thông tin thanh toán</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!-- EMPTY -->
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="6" class="text-center">
                                Không có đơn hàng
                            </td>
                        </tr>

                        <!-- DATA -->
                        <tr th:each="o : ${orders}">

                            <td th:text="${o.id}"></td>

                            <td th:text="${o.user.fullName}"></td>

                            <td th:text="${o.showtime.movie.title}"></td>

                            <td th:text="${#temporals.format(o.showtime.startTime, 'dd/MM/yyyy HH:mm')}"></td>

                            <td th:text="${o.seatNumber}"></td>

                            <!-- PAYMENT INFO -->
                            <td class="payment-info">

                                <!-- PRICE -->
                                <div class="price"
                                     th:text="${#numbers.formatDecimal(o.totalPrice,0,'COMMA',0,'POINT')} + ' VND'">
                                </div>

                                <!-- STATUS -->
                                <div class="status">
                                    <span th:if="${o.status.name() == 'UNPAID'}"
                                          class="badge bg-secondary">UNPAID</span>

                                    <span th:if="${o.status.name() == 'PENDING'}"
                                          class="badge bg-warning">PENDING</span>

                                    <span th:if="${o.status.name() == 'PAID'}"
                                          class="badge bg-success">PAID</span>

                                    <span th:if="${o.status.name() == 'EXPIRED'}"
                                          class="badge bg-danger">EXPIRED</span>
                                </div>

                                <!-- META -->
                                <div class="meta">
                                    <small th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                                    <br>
                                    <small th:text="${o.paymentMethod}"></small>
                                </div>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script th:src="@{/js/script.js}"></script>

</body>
</html>
