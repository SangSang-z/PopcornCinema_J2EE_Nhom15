<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng chiếu</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="admin-content">

        <h2 class="page-title">Phòng chiếu</h2>

        <div class="admin-card">

            <table class="table admin-table align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Rạp</th>
                    <th>Tên phòng</th>
                    <th>Số ghế</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${rooms == null || #lists.isEmpty(rooms)}">
                    <td colspan="5" class="text-center text-muted">
                        Không có phòng chiếu nào
                    </td>
                </tr>

                <tr th:each="room : ${rooms}">

                    <td th:text="${room.id}"></td>

                    <td th:text="${room.cinema != null ? room.cinema.name : 'N/A'}"></td>

                    <td th:text="${room.name}"></td>

                    <td th:text="${room.seatCapacity != null ? room.seatCapacity : 0}"></td>

                    <td>
                        <a th:href="@{/admin/auditoriums/{id}/seats(id=${room.id})}"
                            class="btn btn-warning btn-sm">
                            Xem ghế
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>
</div>

</body>
</html>
