<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Người dùng</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:insert="admin/fragments/admin-header :: header"></div>

<div class="admin-layout">

    <div th:replace="admin/fragments/admin-sidebar :: sidebar"></div>

    <div class="admin-content">

        <h2 class="page-title">Danh sách người dùng</h2>

        <!-- SEARCH -->
        <form th:action="@{/admin/users}" method="get" class="d-flex mb-3">
            <input type="text" name="keyword"
                   class="form-control me-2"
                   placeholder="Tìm theo tên hoặc email..."
                   th:value="${keyword}">
            <button class="btn btn-primary">Tìm</button>
        </form>

        <div class="admin-card">

            <table class="table table-hover">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>SĐT</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="8" class="text-center">
                        Không có người dùng nào
                    </td>
                </tr>

                <!-- DATA -->
                <tr th:each="u : ${users}">

                    <td th:text="${u.id}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.phone}"></td>

                    <td>
                        <span th:if="${u.role == 'ADMIN'}"
                              class="badge bg-danger">ADMIN</span>

                        <span th:if="${u.role == 'CUSTOMER'}"
                              class="badge bg-secondary">CUSTOMER</span>
                    </td>

                    <td>
                        <span th:if="${u.status == 'ACTIVE'}"
                            class="badge bg-success">Active</span>

                        <span th:if="${u.status == 'LOCKED'}"
                            class="badge bg-dark">Blocked</span>
                    </td>

                    <!-- 🆕 CREATED DATE -->
                    <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                    <td>

                        <!-- DETAIL -->
                        <a th:href="@{'/admin/users/' + ${u.id}}"
                           class="btn btn-info btn-sm">
                            Chi tiết
                        </a>

                        <!-- TOGGLE -->
                        <form th:action="@{'/admin/users/toggle/' + ${u.id}}"
                              method="post"
                              style="display:inline-block;">

                            <button class="btn btn-warning btn-sm"
                                    onclick="return confirm('Bạn có chắc muốn thay đổi trạng thái?')">

                                <span th:if="${u.status == 'ACTIVE'}">Khóa</span>
                                <span th:if="${u.status == 'LOCKED'}">Mở khóa</span>

                            </button>

                        </form>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
