<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Chi tiết người dùng</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="admin/fragments/admin-header :: header"></div>

<div class="admin-layout">

<div th:replace="admin/fragments/admin-sidebar :: sidebar"></div>

<div class="admin-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title mb-0">Chi tiết người dùng</h2>

        <a href="/admin/users" class="btn btn-outline-secondary">
            ← Quay lại
        </a>
    </div>

    <!-- USER INFO -->
    <div class="card shadow-sm mb-4 p-4">

        <div class="row">

            <div class="col-md-6">
                <p><strong>ID:</strong> <span th:text="${user.id}"></span></p>
                <p><strong>Tên:</strong> <span th:text="${user.fullName}"></span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                <p><strong>SĐT:</strong> <span th:text="${user.phone}"></span></p>
            </div>

            <div class="col-md-6">
                <p>
                    <strong>Trạng thái:</strong>

                    <span th:if="${user.status == 'ACTIVE'}"
                          class="badge bg-success">Active</span>

                    <span th:if="${user.status == 'LOCKED'}"
                          class="badge bg-dark">Blocked</span>
                </p>

                <p>
                    <strong>Ngày tạo:</strong>
                    <span th:text="${user.createdAt != null ? #temporals.format(user.createdAt,'dd/MM/yyyy HH:mm') : ''}"></span>
                </p>

                <p>
                    <strong>Tổng chi tiêu:</strong>
                    <span class="text-danger fw-bold"
                          th:text="${#numbers.formatDecimal(totalSpent,0,'COMMA',0,'POINT')} + ' VND'">
                    </span>
                </p>
            </div>

        </div>

    </div>

    <!-- BOOKING LIST -->
    <div class="card shadow-sm p-4">

        <h5 class="mb-3">Lịch sử đơn hàng</h5>

        <table class="table table-hover align-middle">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Phim</th>
                <th>Suất chiếu</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Ngày</th>
            </tr>
            </thead>

            <tbody>

            <!-- EMPTY -->
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="6" class="text-center text-muted">
                    Chưa có đơn hàng
                </td>
            </tr>

            <!-- DATA -->
            <tr th:each="o : ${bookings}">

                <td th:text="${o.id}"></td>

                <td th:text="${o.showtime != null ? o.showtime.movie.title : ''}"></td>

                <td th:text="${o.showtime != null ? #temporals.format(o.showtime.startTime,'dd/MM/yyyy HH:mm') : ''}"></td>

                <td class="text-danger fw-semibold"
                    th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + ' VND'">
                </td>

                <td>
                    <span th:if="${o.status == 'PENDING'}" class="badge bg-warning">PENDING</span>
                    <span th:if="${o.status == 'PAID'}" class="badge bg-success">PAID</span>
                    <span th:if="${o.status == 'CANCELLED'}" class="badge bg-danger">CANCELLED</span>
                </td>

                <td th:text="${o.createdAt != null ? #temporals.format(o.createdAt,'dd/MM/yyyy HH:mm') : ''}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

</body>
</html>
