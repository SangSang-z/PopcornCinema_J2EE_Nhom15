<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Thêm suất chiếu</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <div class="container mt-4 admin-card">

                <h2 class="mb-4 fw-bold">Thêm suất chiếu</h2>

                <form th:action="@{/admin/showtimes/save}" method="post">

                    <div class="row">

                        <!-- MOVIE -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phim</label>
                            <select name="movieId" class="form-select" required>
                                <option value="">-- Chọn phim --</option>
                                <option th:each="movie : ${movies}"
                                        th:value="${movie.id}"
                                        th:text="${movie.title}">
                                </option>
                            </select>
                        </div>

                        <!-- ROOM -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phòng chiếu</label>
                            <select name="auditoriumId" class="form-select" required>
                                <option value="">-- Chọn phòng --</option>
                                <option th:each="room : ${auditoriums}"
                                        th:value="${room.id}"
                                        th:text="${room.cinema != null ? room.cinema.name + ' - ' + room.name : room.name}">
                                </option>
                            </select>
                        </div>

                    </div>

                    <div class="row">

                        <!-- TIME -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Thời gian chiếu</label>
                            <input type="datetime-local"
                                   name="startTime"
                                   class="form-control"
                                   required>
                        </div>

                        <!-- PRICE -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Giá vé (VND)</label>
                            <input type="number"
                                   name="basePrice"
                                   class="form-control"
                                   placeholder="Ví dụ: 90000"
                                   min="10000"
                                   required>
                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-success px-4">
                            Lưu suất chiếu
                        </button>

                        <a th:href="@{/admin/showtimes}" class="btn btn-secondary">
                            Huỷ
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
