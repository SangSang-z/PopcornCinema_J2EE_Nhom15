<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Chỉnh sửa xuất chiếu</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="showtime-form-container">

    <h2 class="form-title">Chỉnh sửa suất chiếu</h2>

    <form th:action="@{/admin/showtimes/update}" method="post" class="showtime-form">

        <input type="hidden" name="id" th:value="${showtime.id}">

        <!-- MOVIE -->
        <div class="form-group">
            <label>Phim</label>
            <select name="movieId">
                <option th:each="movie : ${movies}"
                        th:value="${movie.id}"
                        th:selected="${showtime.movie != null && movie.id == showtime.movie.id}"
                        th:text="${movie.title}">
                </option>
            </select>
        </div>

        <!-- AUDITORIUM -->
        <div class="form-group">
            <label>Phòng chiếu</label>
            <select name="auditoriumId">
                <option th:each="room : ${auditoriums}"
                        th:value="${room.id}"
                        th:selected="${showtime.auditorium != null && room.id == showtime.auditorium.id}"
                        th:text="${room.name}">
                </option>
            </select>
        </div>

        <!-- TIME -->
        <div class="form-group">
            <label>Thời gian chiếu</label>
            <input type="datetime-local"
                   name="startTime"
                   th:value="${showtime.startTime != null ? #temporals.format(showtime.startTime,'yyyy-MM-dd''T''HH:mm') : ''}">
        </div>

        <!-- PRICE -->
        <div class="form-group">
            <label>Giá vé</label>
            <input type="number"
                   name="basePrice"
                   th:value="${showtime.basePrice != null ? showtime.basePrice : 0}">
        </div>

        <button class="btn-submit">Update</button>

    </form>

</div>
</body>
</html>
