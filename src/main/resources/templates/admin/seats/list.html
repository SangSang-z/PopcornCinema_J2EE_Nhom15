<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Layout ghế</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="admin-content">

        <h2 class="page-title text-center">
            Layout ghế - <span th:text="${auditorium.name}"></span>
        </h2>

        <!-- SCREEN -->
        <div class="screen">SCREEN</div>

        <!-- SEAT GRID TỪ DATABASE -->
        <div class="seat-container">

            <!-- mỗi hàng (A, B, C...) -->
            <div class="seat-row"
                 th:each="entry : ${seatMap}">

                <!-- label hàng (A, B...) -->
                <div class="row-label"
                     th:text="${entry.key}">
                </div>

                <!-- ghế -->
                <div class="seat"
                     th:each="seat : ${entry.value}"
                     th:text="${seat.seatRow + seat.seatNumber}"

                     th:classappend="
                        ${seat.seatType == 'VIP'} ? ' vip' :
                        (${seat.seatType == 'COUPLE'} ? ' couple' : '')
                     ">
                </div>

            </div>

        </div>

    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
