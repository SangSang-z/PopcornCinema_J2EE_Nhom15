<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chỉnh sửa thông tin phim</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{admin/fragments/admin-header :: header}"></div>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="admin-content">

        <div class="container-fluid">
            <h2 class="mb-4">Chỉnh sửa phim</h2>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/admin/movies/update}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${movie}">

                <input type="hidden" name="id" th:value="${movie.id}">

                <div class="row">

                    <!-- LEFT -->
                    <div class="col-md-8">

                        <div class="mb-3">
                            <label class="form-label">Tên phim</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Đạo diễn</label>
                            <input type="text" th:field="*{director}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Diễn viên</label>
                            <textarea th:field="*{actors}" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Thể loại</label>
                            <input type="text" th:field="*{genres}" class="form-control">
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">Thời lượng</label>
                                <input type="number" th:field="*{durationMinutes}" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Ngày khởi chiếu</label>
                                <input type="date" th:field="*{releaseDate}" class="form-control">
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">Ngôn ngữ</label>
                                <input type="text" th:field="*{language}" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phụ đề</label>
                                <input type="text" th:field="*{subtitle}" class="form-control">
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Độ tuổi</label>
                            <select th:field="*{ageRating}" class="form-control">
                                <option value="P">P</option>
                                <option value="T13">T13</option>
                                <option value="T16">T16</option>
                                <option value="T18">T18</option>
                            </select>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Trailer</label>
                            <input type="text" th:field="*{trailerUrl}" class="form-control">
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-control">
                                <option value="COMING_SOON">Sắp chiếu</option>
                                <option value="NOW_SHOWING">Đang chiếu</option>
                            </select>
                        </div>

                        <button class="btn btn-primary mt-4">
                            Cập nhật phim
                        </button>

                    </div>

                    <!-- RIGHT -->
                    <div class="col-md-4">

                        <div class="mb-3">
                            <label class="form-label">Poster phim</label>

                            <input type="file"
                                   name="posterFile"
                                   class="form-control"
                                   accept="image/*">

                            <div class="mt-3 text-center">
                                <img th:if="${movie.posterUrl != null}"
                                     th:src="@{${movie.posterUrl}}"
                                     class="img-fluid rounded shadow"
                                     style="max-height:300px;">
                            </div>
                        </div>

                    </div>

                </div>

            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
