<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý phim</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <div class="container mt-4">

                <!-- TITLE -->
                <h2 class="mb-4 fw-bold">Quản lý phim chiếu</h2>

                <!-- ACTION BAR -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <a th:href="@{/admin/movies/create}" class="btn btn-primary">
                        + Thêm phim
                    </a>

                    <input type="text"
                           class="form-control w-25"
                           placeholder="Tìm kiếm phim...">
                </div>

                <!-- TABLE CARD -->
                <div class="admin-card">

                    <table class="table admin-table table-hover align-middle text-center">

                        <thead class="table-dark">
                            <tr>
                                <th>Poster</th>
                                <th>Tên phim</th>
                                <th>Thời lượng</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>

                        <tbody>

                            <!-- EMPTY -->
                            <tr th:if="${#lists.isEmpty(movies)}">
                                <td colspan="5">Không có phim nào</td>
                            </tr>

                            <!-- DATA -->
                            <tr th:each="movie : ${movies}">

                                <!-- POSTER -->
                                <td>
                                    <img class="movie-poster"
                                         th:src="${movie.posterUrl != null ? movie.posterUrl : '/images/no-image.png'}">
                                </td>

                                <!-- TITLE -->
                                <td class="fw-semibold"
                                    th:text="${movie.title}">
                                </td>

                                <!-- DURATION -->
                                <td th:text="${movie.durationMinutes} + ' phút'"></td>

                                <!-- STATUS -->
                                <td>
                                    <span class="badge bg-success"
                                          th:if="${movie.status == 'NOW_SHOWING'}">
                                          Đang chiếu
                                    </span>

                                    <span class="badge bg-warning text-dark"
                                          th:if="${movie.status == 'COMING_SOON'}">
                                          Sắp chiếu
                                    </span>

                                    <span class="badge bg-secondary"
                                          th:if="${movie.status == 'STOPPED'}">
                                          Ngừng chiếu
                                    </span>
                                </td>

                                <!-- ACTION -->
                                <td>
                                    <div class="actions">

                                    <!-- VIEW -->
                                    <button class="btn btn-info btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#movieDetailModal"

                                            th:data-title="${movie.title}"
                                            th:data-director="${movie.director}"
                                            th:data-actors="${movie.actors}"
                                            th:data-genres="${movie.genres}"
                                            th:data-duration="${movie.durationMinutes}"
                                            th:data-status="${movie.status}"
                                            th:data-poster="${movie.posterUrl}"
                                            th:data-description="${movie.description}">
                                        Xem
                                    </button>

                                    <!-- EDIT -->
                                    <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}"
                                       class="btn btn-warning btn-sm">
                                       Sửa
                                    </a>

                                    <!-- DELETE -->
                                    <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Bạn có chắc muốn xóa phim này?')">
                                       Xóa
                                    </a>

                                    </div>
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- MODAL -->
    <div th:replace="~{admin/movies/modal-detail :: modal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>

</body>
</html>
