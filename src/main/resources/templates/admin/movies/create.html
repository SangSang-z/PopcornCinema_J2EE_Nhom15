<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Thêm phim</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{admin/fragments/admin-header :: header}"></div>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <div class="container mt-4 admin-card">

                <h2 class="mb-4 fw-bold">Thêm phim mới</h2>

                <!-- ERROR -->
                <div class="alert alert-danger"
                     th:if="${error}"
                     th:text="${error}">
                </div>

                <form th:action="@{/admin/movies/save}"
                      method="post"
                      enctype="multipart/form-data"
                      class="admin-form">

                    <div class="row">

                        <!-- LEFT -->
                        <div class="col-md-6">

                            <div class="mb-3">
                                <label class="form-label">Tên phim *</label>
                                <input type="text"
                                       name="title"
                                       class="form-control"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Thời lượng (phút) *</label>
                                <input type="number"
                                       name="durationMinutes"
                                       class="form-control"
                                       required min="1">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Độ tuổi *</label>
                                <select name="ageRating"
                                        class="form-select"
                                        required>
                                    <option value="">-- Chọn --</option>
                                    <option value="P">P</option>
                                    <option value="T13">T13</option>
                                    <option value="T16">T16</option>
                                    <option value="T18">T18</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Trạng thái *</label>
                                <select name="status"
                                        class="form-select"
                                        required>
                                    <option value="COMING_SOON">Sắp chiếu</option>
                                    <option value="NOW_SHOWING">Đang chiếu</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ngày khởi chiếu</label>
                                <input type="date"
                                       name="releaseDate"
                                       class="form-control">
                            </div>

                        </div>

                        <!-- RIGHT -->
                        <div class="col-md-6">

                            <!-- POSTER -->
                            <div class="mb-3">
                                <label class="form-label">Poster *</label>
                                <input type="file"
                                       name="posterFile"
                                       id="posterInput"
                                       class="form-control"
                                       accept="image/*"
                                       required>

                                <small class="text-muted">
                                    Khuyên dùng ảnh &lt; 5MB
                                </small>

                                <div class="mt-2">
                                    <img id="preview"
                                         class="img-preview"
                                         style="display:none; max-width:220px;">
                                </div>
                            </div>

                            <!-- BANNER -->
                            <div class="mb-3">
                                <label class="form-label">Banner</label>
                                <input type="file"
                                       name="bannerFile"
                                       id="bannerInput"
                                       class="form-control"
                                       accept="image/*">

                                <small class="text-muted">
                                    Banner là ảnh riêng cho phần đầu trang chi tiết phim
                                </small>

                                <div class="mt-2">
                                    <img id="bannerPreview"
                                         class="img-preview"
                                         style="display:none; max-width:100%; max-height:180px;">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Đạo diễn</label>
                                <input type="text"
                                       name="director"
                                       class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Diễn viên</label>
                                <textarea name="actors"
                                          class="form-control"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Thể loại</label>
                                <input type="text"
                                       name="genres"
                                       class="form-control">
                            </div>

                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ngôn ngữ</label>
                        <input type="text"
                               name="language"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phụ đề</label>
                        <input type="text"
                               name="subtitle"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trailer</label>
                        <input type="text"
                               name="trailerUrl"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea name="description"
                                  class="form-control"
                                  rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success px-4">
                        Lưu phim
                    </button>

                </form>

            </div>

        </div>

    </div>

    <script>
        document.getElementById("posterInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById("preview");

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            } else {
                preview.src = "";
                preview.style.display = "none";
            }
        });

        document.getElementById("bannerInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById("bannerPreview");

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            } else {
                preview.src = "";
                preview.style.display = "none";
            }
        });
    </script>

</body>
</html>
