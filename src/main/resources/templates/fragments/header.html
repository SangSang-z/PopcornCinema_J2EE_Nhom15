<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    
<body>

<header th:fragment="header">
   <input type="hidden" id="app-user" th:value="${session.user != null ? session.user.id : ''}">
    <nav class="navbar">

        <!-- LEFT -->
        <div class="nav-left">
            <a th:href="@{/home}" class="logo-link">
                <img th:src="@{/images/logo.png}" class="logo-img" alt="Popcorn Cinema">
            </a>

            <ul class="nav-links">
                <li><a th:href="@{/movies}">Phim</a></li>
                <li><a th:href="@{/promotions}">Sự kiện</a></li>
            </ul>
        </div>

        <!-- RIGHT -->
        <div class="nav-right">

            <!-- CHƯA LOGIN -->
            <div th:if="${session.user == null}" class="nav-auth">
                <i class="fa-regular fa-user"></i>

                <a th:href="@{/login}">Đăng nhập</a>
                <span>/</span>
                <a th:href="@{/register}">Đăng ký</a>
            </div>

            <!-- ĐÃ LOGIN -->
            <div th:if="${session.user != null}" class="user-dropdown">

                <!-- TOGGLE -->
                <div class="user-toggle">
                    <i class="fa-solid fa-user"></i>

                    <span class="user-name"
                          th:text="${session.user.fullName}">
                    </span>

                    <i class="fa-solid fa-caret-down"></i>
                </div>

                <!-- DROPDOWN -->
                <div class="dropdown-menu">

                    <a th:href="@{/profile}">
                        <i class="fa-regular fa-user"></i>
                        Thông tin cá nhân
                    </a>

                    <a th:href="@{/logout}" class="logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Đăng xuất
                    </a>

                </div>

            </div>

        </div>

    </nav>

    <script>
        document.addEventListener("click", (event) => {
            const trigger = event.target.closest("[data-require-login='true']");
            if (!trigger) return;

            const userId = document.getElementById("app-user")?.value;
            if (!userId) {
                event.preventDefault();
                window.location.href = "/login";
            }
        });

        const userDropdown = document.querySelector(".user-dropdown");
        const userToggle = document.querySelector(".user-toggle");

        if (userDropdown && userToggle) {
            userToggle.addEventListener("click", (event) => {
                event.stopPropagation();
                userDropdown.classList.toggle("open");
            });

            document.addEventListener("click", () => {
                userDropdown.classList.remove("open");
            });
        }
    </script>
</header>

</body>
</html>
