<h1 th:text="${promotion.title}"></h1>

<img th:src="${promotion.image}" width="400"/>

    <input type="hidden" name="promotionId" th:value="${promotion.id}"/>

    <button type="submit">Lưu khuyến mãi</button>
</form>
