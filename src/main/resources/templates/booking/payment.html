<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bắp nước</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/payment.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="booking-progress-wrapper">
    <div class="booking-progress">
        <div class="progress-step">
            <span>Chọn phim/ rạp/ suất</span>
        </div>

        <div class="progress-step">
            <span>Chọn ghế</span>
        </div>

        <div class="progress-step active">
            <span>Bắp nước</span>
        </div>

        <div class="progress-step">
            <span>Thanh toán</span>
        </div>

        <div class="progress-step">
            <span>Thông tin vé</span>
        </div>
    </div>
</div>

<div class="combo-page">
    <div class="combo-container">
        <div class="combo-left">
            <div class="combo-topbar">
                <h2>Chọn bắp nước</h2>
                <div class="countdown">Thời gian giữ ghế: <span id="countdown">05:00</span></div>
            </div>

            <div class="combo-table">
                <div class="combo-header">
                    <div>COMBO</div>
                    <div>GIÁ TIỀN</div>
                    <div>SỐ LƯỢNG</div>
                </div>

                <div id="combo-list"></div>
            </div>
        </div>

        <div class="combo-right">
            <div class="ticket-card">
                <img id="ticket-poster" src="" alt="Poster phim">

                <div class="ticket-info">
                    <h3 id="ticket-title">Đang tải...</h3>
                    <p><span id="ticket-age-rating" class="age-badge">T16</span></p>
                    <p id="ticket-cinema">Rạp: ...</p>
                    <p id="ticket-auditorium">Phòng: ...</p>
                    <p id="ticket-datetime">Suất: ...</p>
                    <p id="ticket-seats">Ghế: ...</p>

                    <div class="ticket-divider"></div>

                    <p id="ticket-seat-total">Tiền ghế: 0 đ</p>
                    <p id="ticket-combo-total">Combo: 0 đ</p>
                    <p class="ticket-total">Tổng cộng: <span id="ticket-total">0 đ</span></p>
                </div>

                <div class="ticket-actions">
                    <a id="back-btn" href="#" class="btn-back">Quay lại</a>
                    <a id="next-btn" href="#" class="btn-next">Tiếp tục</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script th:src="@{/js/payment.js(v=${#dates.createNow().time})}"></script>
</body>
</html>
