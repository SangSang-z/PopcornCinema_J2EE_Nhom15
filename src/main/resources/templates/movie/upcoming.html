<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phim Sắp Chiếu - Popcorn Cinema</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="movie-page-body">

<div class="movie-layout">

    <div th:replace="fragments/header :: header"></div>

    <main class="movie-main">

        <div class="site-container">

            <section class="movie-section">

                <div class="movie-tabs">
                    <a th:href="@{/movies}" class="movie-tab">Đang Chiếu</a>
                    <a th:href="@{/movies/upcoming}" class="movie-tab active">Sắp Chiếu</a>
                </div>

              <div class="movie-grid">

    <div class="movie-card" th:each="i : ${#numbers.sequence(24,50)}">
        <div class="movie-poster">
            <img th:src="@{'/images/movie/phim' + ${i} + '.jpg'}" alt="Phim">
        </div>
    </div>

                        

                </div>

            </section>

        </div>

    </main>

    <div th:replace="fragments/footer :: footer"></div>

</div>

</body>
</html>
