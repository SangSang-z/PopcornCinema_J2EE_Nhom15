<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phim Sắp Chiếu - Popcorn Cinema</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="movie-page-body">

<div class="movie-layout">

    <div th:replace="fragments/header :: header"></div>

    <main class="movie-main">

        <div class="site-container">

            <section class="movie-section">

                <div class="movie-tabs">
                    <a th:href="@{/movies}" class="movie-tab">Đang Chiếu</a>
                    <a th:href="@{/movies/upcoming}" class="movie-tab active">Sắp Chiếu</a>
                </div>

                <div class="movie-list">

                    <div class="movie-card" th:each="i : ${#numbers.sequence(24,50)}">
                        <div class="movie-poster">
                            <img th:src="@{'/images/movie/phim' + ${i} + '.jpg'}" alt="Phim">

                            <div class="overlay">
                                <a href="#">
                                    <button class="btn-book">Xem chi tiết</button>
                                </a>
                            </div>
                        </div>
                    </div>

                </div>

            </section>

        </div>

    </main>

    <div th:replace="fragments/footer :: footer"></div>

</div>

</body>
</html>
